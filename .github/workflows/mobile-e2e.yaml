name: E2E Tests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # Fast job: Playwright tests for responsive layout (mobile + desktop)
  playwright-web:
    name: Playwright Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            test-results/
          retention-days: 7

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-results/e2e-results.xml
          check_name: Playwright E2E Results

  # Build extension artifact for Android testing
  build-extension:
    name: Build Firefox Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build Firefox .xpi
        run: python3 build.py

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: redirector-firefox-xpi
          path: build/redirector-firefox.xpi
          retention-days: 7

  # Slow job: Maestro on Android emulator with Firefox
  maestro-android:
    name: Maestro E2E on Firefox Android
    runs-on: ubuntu-latest
    needs: build-extension
    timeout-minutes: 45
    # Only run on push to main or manual trigger (skip on PRs to save CI time)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      ANDROID_HOME: /home/runner/androidsdk
      ANDROID_SDK_ROOT: /home/runner/androidsdk
      ANDROID_AVD_HOME: /home/runner/.config/.android/avd/
      ANDROID_OS_IMAGE: "system-images;android-33;google_apis;x86_64"
      ANDROID_PLATFORM: "platforms;android-33"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro
        run: maestro --version

      - name: Set up Android Command-line Tools
        run: |
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd "$ANDROID_HOME"
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm cmdline-tools.zip
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Set up Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install emulator
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          sdkmanager --install "platform-tools"
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          sdkmanager --install "$ANDROID_PLATFORM"
          sdkmanager --install "$ANDROID_OS_IMAGE"

      - name: Create AVD
        run: |
          avdmanager -s create avd \
            --package "$ANDROID_OS_IMAGE" \
            --name "TestDevice" \
            --device "pixel_4"

          cat << 'AVDEOF' >> $ANDROID_AVD_HOME/TestDevice.avd/config.ini
          hw.cpu.ncore=2
          hw.gpu.enabled=yes
          hw.gpu.mode=swiftshader_indirect
          hw.ramSize=3072
          disk.dataPartition.size=4G
          vm.heapSize=576
          hw.lcd.density=440
          hw.lcd.height=2280
          hw.lcd.width=1080
          AVDEOF

      - name: Start emulator
        run: |
          emulator @TestDevice \
            -no-snapshot -no-window -no-audio -no-boot-anim \
            -accel on -camera-back none \
            -qemu -m 3072 \
            >~/emulator_stdout.log \
            2>~/emulator_stderr.log &

      - name: Wait for emulator to boot
        run: |
          echo "Waiting for device..."
          adb wait-for-device
          echo "Waiting for boot to complete..."
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
          echo "Emulator booted!"

          while true; do
            adb shell service list 2>/dev/null | grep -q 'package' && echo 'Package manager ready' && break
            echo 'Waiting for package manager...'
            sleep 2
          done

      - name: Install Firefox for Android
        run: |
          curl -L -o /tmp/firefox.apk \
            "https://download.mozilla.org/?product=fenix-latest&os=android&lang=multi" && \
          adb install /tmp/firefox.apk

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: redirector-firefox-xpi

      - name: Install extension in Firefox
        run: |
          adb push redirector-firefox.xpi /sdcard/Download/redirector.xpi
          echo "Extension pushed to device"

      - name: Start screen recording
        run: |
          adb shell screenrecord /sdcard/screenrecord.mp4 &
          echo $! > ~/screenrecord.pid

      - name: Run Maestro E2E tests
        timeout-minutes: 20
        run: |
          maestro test .maestro/ \
            --exclude-tags web-only \
            --format junit \
            --output maestro-results.xml \
            || true

      - name: Stop screen recording
        if: always()
        run: |
          kill -SIGINT "$(cat ~/screenrecord.pid)" 2>/dev/null || true
          sleep 3
          adb pull /sdcard/screenrecord.mp4 ~/screenrecord.mp4 2>/dev/null || true

      - name: Upload Maestro test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: |
            maestro-results.xml
          retention-days: 7

      - name: Upload screen recording
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-screen-recording
          path: ~/screenrecord.mp4
          retention-days: 7

      - name: Upload emulator logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: emulator-logs
          path: |
            ~/emulator_stdout.log
            ~/emulator_stderr.log
          retention-days: 7

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: maestro-results.xml
          check_name: Maestro Mobile E2E Results
